server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: fish

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET}
